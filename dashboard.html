<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 flex items-center justify-center h-screen font-sans text-slate-900">
    
    <div class="bg-white p-10 rounded-2xl shadow-xl border border-slate-200 text-center max-w-lg w-full">
        <div class="mx-auto w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        <h1 class="text-3xl font-bold text-slate-800 mb-2 tracking-tight">Xin chào, <span id="staffName" class="text-indigo-600">...</span>!</h1>
        <p class="text-slate-500 mb-8">Chào mừng bạn đến với hệ thống nhân sự nội bộ.</p>
        
        <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 mb-8 text-left text-sm text-indigo-800">
            <strong>Thông tin tài khoản:</strong>
            <ul class="mt-2 space-y-1">
                <li>Username: <span id="staffUsername" class="font-mono bg-indigo-100/50 px-1.5 py-0.5 rounded text-indigo-900 font-medium"></span></li>
                <li>Vai trò: <span id="staffRole" class="uppercase font-bold tracking-wider text-xs bg-indigo-200 px-2 py-0.5 rounded text-indigo-800 ml-1"></span></li>
            </ul>
        </div>

        <button onclick="logout()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-lg transition shadow-md">Đăng xuất hệ thống</button>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('internalSessionUser') || 'null');
        if (!session) {
            alert('Bạn chưa đăng nhập!');
            window.location.href = '/index.html';
        } else {
            document.getElementById('staffName').textContent = session.fullName;
            document.getElementById('staffUsername').textContent = session.username;
            document.getElementById('staffRole').textContent = session.role;
        }

        function logout() {
            localStorage.removeItem('internalSessionUser');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
